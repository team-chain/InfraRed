version: "3.9"

# InfraRed Production Docker Compose
# EC2 t3.small / t3.medium 기준 메모리 상한 설정

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ─────────────────────────────────────────────────────────────
  # FastAPI 백엔드
  # ─────────────────────────────────────────────────────────────
  api:
    image: infrared-api:${IMAGE_TAG:-latest}
    build:
      context: ../../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://infrared:${DB_PASSWORD}@postgres:5432/infrared
      - REDIS_URL=redis://redis:6379/0
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
      - JWT_SECRET=${JWT_SECRET}
      - DRY_RUN=${DRY_RUN:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://your-domain.com}
      - S3_LOG_BUCKET=${S3_LOG_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infrared-internal
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────
  # Detection Worker
  # ─────────────────────────────────────────────────────────────
  detection-worker:
    image: infrared-api:${IMAGE_TAG:-latest}
    command: ["python", "-m", "workers.detection_worker"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://infrared:${DB_PASSWORD}@postgres:5432/infrared
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - api
    networks:
      - infrared-internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # Incident Worker
  # ─────────────────────────────────────────────────────────────
  incident-worker:
    image: infrared-api:${IMAGE_TAG:-latest}
    command: ["python", "-m", "workers.incident_worker"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://infrared:${DB_PASSWORD}@postgres:5432/infrared
      - REDIS_URL=redis://redis:6379/0
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - api
    networks:
      - infrared-internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infrared
      POSTGRES_USER: infrared
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - infrared-internal
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrared -d infrared"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - infrared-internal
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.3"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Nginx (리버스 프록시 + SSL)
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - infrared-internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.2"
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # Certbot (SSL 자동 갱신)
  # ─────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # Fluent Bit (S3 로그 파이프라인)
  # ─────────────────────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:3
    restart: unless-stopped
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - nginx-logs:/var/log/nginx:ro
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - S3_LOG_BUCKET=${S3_LOG_BUCKET}
    networks:
      - infrared-internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  certbot-certs:
  certbot-www:
  nginx-logs:

networks:
  infrared-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

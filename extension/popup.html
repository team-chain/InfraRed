<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraRed Security</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- 헤더 -->
    <div class="header">
      <span class="logo">🔴 InfraRed</span>
      <button id="btn-refresh" class="icon-btn" title="새로고침">↻</button>
      <button id="btn-settings" class="icon-btn" title="설정">⚙</button>
    </div>

    <!-- 설정 화면 (숨김) -->
    <div id="section-settings" class="hidden">
      <div class="form-group">
        <label>API Base URL</label>
        <input id="input-api-base" type="text" placeholder="https://api.infrared.io" />
      </div>
      <div class="form-group">
        <label>JWT Token (대시보드 로그인 후 복사)</label>
        <input id="input-token" type="password" placeholder="eyJ..." />
      </div>
      <button id="btn-save-settings" class="btn-primary">저장</button>
    </div>

    <!-- 메인 화면 -->
    <div id="section-main">
      <div class="tab-bar">
        <button class="tab active" data-tab="incidents">Incidents</button>
        <button class="tab" data-tab="pending">승인 대기 <span id="pending-badge"></span></button>
      </div>

      <div id="tab-incidents" class="tab-content">
        <div id="incidents-list"></div>
      </div>

      <div id="tab-pending" class="tab-content hidden">
        <div id="pending-list"></div>
      </div>

      <div id="last-updated" class="footer-note"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

# Frontend 컨테이너 내부 nginx
# - 정적 파일 서빙 (vite build 결과물)
# - SPA fallback: 모든 알 수 없는 경로 → index.html (React Router 대응)
# - gzip + 정적 자산 long cache
# - TLS는 EC2 레벨 nginx에서 처리하므로 여기는 HTTP only

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml text/javascript;
    gzip_min_length 1024;

    # 정적 자산 (해시 들어간 파일들) 1년 캐시
    location ~* \.(js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html은 캐시 금지 (배포 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback: 모든 라우트는 index.html 반환
    location / {
        try_files $uri $uri/ /index.html;
    }
}

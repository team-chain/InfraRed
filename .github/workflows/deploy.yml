name: Deploy to EC2

# main 브랜치 push 시 자동 배포, 또는 Actions 탭에서 수동 실행
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "agent/**"
      - "infra/docker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "재배포할 서비스 (콤마 구분: backend,frontend,agent / 전체는 all)"
        required: false
        default: "all"

env:
  AWS_REGION: ap-northeast-2
  ECR_BASE: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com
  # OIDC 기반 keyless 인증 — terraform `output github_actions_role_arn` 값
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::139139347353:role/infrared-dev-github-actions-deploy

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-22.04

    # OIDC: GitHub이 발급한 JWT를 STS에 제출하려면 id-token 쓰기 권한 필요
    permissions:
      id-token: write
      contents: read

    outputs:
      backend_changed: ${{ steps.changed.outputs.backend }}
      frontend_changed: ${{ steps.changed.outputs.frontend }}
      agent_changed: ${{ steps.changed.outputs.agent }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changed
        run: |
          # workflow_dispatch면 input 우선
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SVC="${{ inputs.services }}"
            if [[ "$SVC" == "all" ]]; then
              echo "backend=true" >> $GITHUB_OUTPUT
              echo "frontend=true" >> $GITHUB_OUTPUT
              echo "agent=true" >> $GITHUB_OUTPUT
            else
              [[ "$SVC" == *backend*  ]] && echo "backend=true"  >> $GITHUB_OUTPUT || echo "backend=false"  >> $GITHUB_OUTPUT
              [[ "$SVC" == *frontend* ]] && echo "frontend=true" >> $GITHUB_OUTPUT || echo "frontend=false" >> $GITHUB_OUTPUT
              [[ "$SVC" == *agent*    ]] && echo "agent=true"    >> $GITHUB_OUTPUT || echo "agent=false"    >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # push 이벤트면 diff로 판단
          BASE="${{ github.event.before }}"
          [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]] && BASE="HEAD~1"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          echo "$CHANGED" | grep -qE '^backend/|^infra/docker/backend\.' && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE '^frontend/|^infra/docker/frontend\.' && echo "frontend=true" >> $GITHUB_OUTPUT || echo "frontend=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE '^agent/|^infra/docker/agent\.' && echo "agent=true" >> $GITHUB_OUTPUT || echo "agent=false" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gh-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ────────────────────────────────────────────
      - name: Build & push backend
        if: steps.changed.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./infra/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.ECR_BASE }}/infrared-dev-backend:latest
            ${{ env.ECR_BASE }}/infrared-dev-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend ───────────────────────────────────────────
      - name: Build & push frontend
        if: steps.changed.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./infra/docker/frontend.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.infrared.kr
          tags: |
            ${{ env.ECR_BASE }}/infrared-dev-frontend:latest
            ${{ env.ECR_BASE }}/infrared-dev-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Agent ──────────────────────────────────────────────
      - name: Build & push agent
        if: steps.changed.outputs.agent == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./infra/docker/agent.Dockerfile
          push: true
          tags: |
            ${{ env.ECR_BASE }}/infrared-dev-agent:latest
            ${{ env.ECR_BASE }}/infrared-dev-agent:${{ github.sha }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  deploy:
    name: Pull & Restart on EC2
    runs-on: ubuntu-22.04
    needs: build-and-push
    if: |
      needs.build-and-push.outputs.backend_changed == 'true' ||
      needs.build-and-push.outputs.frontend_changed == 'true' ||
      needs.build-and-push.outputs.agent_changed == 'true'

    # 이 job은 SSH로만 EC2를 조작함. ECR pull은 EC2의 amazon-ecr-credential-helper가
    # 인스턴스 IAM role로 처리하므로 GitHub Actions 측 AWS 자격증명 불필요.

    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Pull new images on EC2 and restart
        run: |
          # EC2에 amazon-ecr-credential-helper 설치돼있어서 docker login 불필요
          ssh -i ~/.ssh/ec2.pem ec2-user@${{ secrets.EC2_HOST }} <<'EOF'
            set -euo pipefail
            cd /opt/infrared
            docker compose pull
            docker compose up -d
            # Recreating ingestion gives it a new internal IP; nginx caches
            # the old upstream IP and would otherwise return 502 until its
            # own resolver TTL expires. Restart nginx to refresh the
            # upstream lookup so the smoke test below sees the new container.
            docker compose restart nginx
            docker compose ps
          EOF

      - name: Smoke test
        run: |
          sleep 10
          curl -sf -o /dev/null -w "app:  %{http_code}\n" https://app.infrared.kr/        | tee result.txt
          curl -sf -o /dev/null -w "api:  %{http_code}\n" https://api.infrared.kr/healthz | tee -a result.txt
          # 둘 다 200이 아니면 fail
          grep -q "app:  200" result.txt && grep -q "api:  200" result.txt

services:
  redis:
    image: redis:7-alpine
    container_name: infrared-redis
    command: >
      redis-server
      --requirepass infrared-redis-pw
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    mem_limit: 100m
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "infrared-redis-pw", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  step-ca:
    image: smallstep/step-ca:latest
    container_name: infrared-step-ca
    mem_limit: 80m
    volumes:
      - step-ca-data:/home/step
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000", "--root", "/home/step/certs/root_ca.crt"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  ingestion:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-backend:latest
    container_name: infrared-ingestion
    command: ["sh", "-c", "python -m app.db.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    env_file: /opt/infrared/.env
    mem_limit: 175m
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  detection-worker:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-backend:latest
    container_name: infrared-detection
    command: ["python", "-m", "app.workers.detection.worker"]
    env_file: /opt/infrared/.env
    mem_limit: 145m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  enrichment-worker:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-backend:latest
    container_name: infrared-enrichment
    command: ["python", "-m", "app.workers.enrichment.worker"]
    env_file: /opt/infrared/.env
    mem_limit: 60m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  incident-worker:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-backend:latest
    container_name: infrared-incident
    command: ["python", "-m", "app.workers.correlation.worker"]
    env_file: /opt/infrared/.env
    mem_limit: 115m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  campaign-worker:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-backend:latest
    container_name: infrared-campaign
    command: ["python", "-m", "app.workers.campaign.worker"]
    env_file: /opt/infrared/.env
    mem_limit: 50m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  cleanup-worker:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-backend:latest
    container_name: infrared-cleanup
    command: ["python", "-m", "app.workers.cleanup.worker"]
    env_file: /opt/infrared/.env
    mem_limit: 80m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-frontend:latest
    container_name: infrared-frontend
    env_file: /opt/infrared/.env
    mem_limit: 300m
    ports:
      - "3000:3000"
    depends_on:
      - ingestion
    restart: unless-stopped

  agent:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-agent:latest
    container_name: infrared-agent
    env_file: /opt/infrared/.env
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 60m
    volumes:
      - /var/log:/host/var/log:ro
      - agent-state:/var/lib/infrared
    depends_on:
      - ingestion
    restart: on-failure

  watchdog:
    image: 139139347353.dkr.ecr.ap-northeast-2.amazonaws.com/infrared-dev-agent:latest
    container_name: infrared-watchdog
    command: ["python", "-m", "infrared_agent.watchdog"]
    env_file: /opt/infrared/.env
    deploy:
      resources:
        limits:
          cpus: "0.02"
          memory: 30m
    depends_on:
      - ingestion
    restart: always

volumes:
  redis-data:
  step-ca-data:
    external: true
    name: step-ca-data
  agent-state:

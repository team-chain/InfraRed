services:
  postgres:
    image: postgres:16-alpine
    container_name: infrared-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infrared}
      POSTGRES_USER: ${POSTGRES_USER:-infrared}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infrared-dev-pw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infrared} -d ${POSTGRES_DB:-infrared}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: infrared-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: infrared-ingestion
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  detection-worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: infrared-detection
    command: ["python", "-m", "app.workers.detection.worker"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  enrichment-worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: infrared-enrichment
    command: ["python", "-m", "app.workers.enrichment.worker"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  correlation-worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: infrared-correlation
    command: ["python", "-m", "app.workers.correlation.worker"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  llm-worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: infrared-llm
    command: ["python", "-m", "app.workers.llm.worker"]
    env_file: .env
    depends_on:
      ingestion:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  agent:
    build:
      context: ./agent
      dockerfile: ../infra/docker/agent.Dockerfile
    container_name: infrared-agent
    env_file: .env
    depends_on:
      ingestion:
        condition: service_started
    volumes:
      - ./infra/sample-logs:/host/var/log:ro
      - agent-state:/var/lib/infrared

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    container_name: infrared-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      ingestion:
        condition: service_started
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: infrared-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      ingestion:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    container_name: infrared-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  agent-state:
  grafana-data:

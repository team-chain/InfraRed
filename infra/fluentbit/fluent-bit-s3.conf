# S3 출력 설정 — InfraRed 장기 보관용
# S3_BUCKET 환경변수가 설정된 경우에만 이 설정을 마운트하세요.
# 사용법: docker-compose에서 아래 볼륨 추가
#   volumes:
#     - ./infra/fluentbit/fluent-bit-s3.conf:/fluent-bit/etc/fluent-bit-s3.conf:ro
# 그리고 command에 -c /fluent-bit/etc/fluent-bit.conf 외에 include 방식으로 주입

# ── S3 OUTPUT: auth 로그 ──────────────────────────────────────────────────── #
[OUTPUT]
    Name                         s3
    Match                        auth
    bucket                       ${S3_BUCKET}
    region                       ${AWS_REGION:-ap-northeast-2}
    s3_key_format                /infrared/auth/%Y/%m/%d/%H/$TAG[0]_%{seq}.gz
    total_file_size              50M
    upload_timeout               10m
    compression                  gzip
    use_put_object               Off
    storage_class                STANDARD_IA
    log_key                      log

# ── S3 OUTPUT: 웹 로그 ────────────────────────────────────────────────────── #
[OUTPUT]
    Name                         s3
    Match                        web.*
    bucket                       ${S3_BUCKET}
    region                       ${AWS_REGION:-ap-northeast-2}
    s3_key_format                /infrared/web/%Y/%m/%d/%H/$TAG[1]_%{seq}.gz
    total_file_size              100M
    upload_timeout               10m
    compression                  gzip
    use_put_object               Off
    storage_class                STANDARD_IA
    log_key                      log

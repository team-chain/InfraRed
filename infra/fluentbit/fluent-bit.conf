# InfraRed — Fluent Bit 메인 설정
# 역할: 서버 로그를 수집해서 InfraRed API와 (선택적으로) S3에 동시 전송
#
# 환경변수:
#   INFRARED_API_URL   — InfraRed 수집 엔드포인트 (예: http://ingestion:8000)
#   INFRARED_API_KEY   — 테넌트 API 키
#   INFRARED_TENANT_ID — 테넌트 ID
#   S3_BUCKET          — S3 버킷 이름 (없으면 S3 OUTPUT 비활성화)
#   AWS_REGION         — AWS 리전 (기본: ap-northeast-2)

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ── INPUT: auth 로그 (SSH / sudo 등) ─────────────────────────────────────── #
[INPUT]
    Name              tail
    Tag               auth
    Path              /host/var/log/auth.log
    Parser            syslog
    DB                /var/lib/fluentbit/auth.db
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

# ── INPUT: 웹 액세스 로그 (nginx / apache) ────────────────────────────────── #
[INPUT]
    Name              tail
    Tag               web.access
    Path              /host/var/log/nginx/access.log
    Parser            nginx
    DB                /var/lib/fluentbit/nginx.db
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

# ── INPUT: 웹 에러 로그 ────────────────────────────────────────────────────── #
[INPUT]
    Name              tail
    Tag               web.error
    Path              /host/var/log/nginx/error.log
    Parser            syslog
    DB                /var/lib/fluentbit/nginx_err.db
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# ── FILTER: 호스트명 메타데이터 추가 ─────────────────────────────────────── #
[FILTER]
    Name   record_modifier
    Match  *
    Record hostname ${HOSTNAME}
    Record log_source fluentbit

# ── OUTPUT 1: InfraRed API (항상 활성화) ──────────────────────────────────── #
[OUTPUT]
    Name              http
    Match             auth
    Host              ${INFRARED_HOST:-ingestion}
    Port              ${INFRARED_PORT:-8000}
    URI               /ingest/fluent
    Format            json
    Header            X-Tenant-Token ${INFRARED_API_KEY}
    Header            X-Tenant-Id ${INFRARED_TENANT_ID}
    Header            X-Log-Source auth
    Retry_Limit       3
    tls               Off

[OUTPUT]
    Name              http
    Match             web.*
    Host              ${INFRARED_HOST:-ingestion}
    Port              ${INFRARED_PORT:-8000}
    URI               /ingest/fluent
    Format            json
    Header            X-Tenant-Token ${INFRARED_API_KEY}
    Header            X-Tenant-Id ${INFRARED_TENANT_ID}
    Header            X-Log-Source web
    Retry_Limit       3
    tls               Off

# ── OUTPUT 2: S3 장기 보관 ────────────────────────────────────────────────── #
# S3에 보관하려면 docker-compose --profile full 로 실행하고
# .env에 S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY 를 추가한 뒤
# command에 --config /fluent-bit/etc/fluent-bit-s3.conf 를 추가하세요.
# (fluent-bit-s3.conf 파일이 별도로 제공됩니다)

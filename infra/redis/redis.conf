# Redis config — password는 환경변수로 주입 (절대 hardcode 금지).
# Docker entrypoint에서 envsubst 또는 redis-server CLI 인자로 주입:
#   redis-server /etc/redis.conf --requirepass $REDIS_PASSWORD
#
# 이 파일에는 비밀번호를 두지 않는다. .env 또는 secrets manager 사용.

bind 0.0.0.0
protected-mode yes
port 6379

# requirepass는 docker-compose.yml의 command에서 $REDIS_PASSWORD로 주입됨.
# (이 파일을 직접 마운트하는 경우엔 entrypoint에서 envsubst 후 사용)

maxmemory 256mb
maxmemory-policy allkeys-lru

save 900 1
save 300 10
appendonly no

slowlog-log-slower-than 10000
slowlog-max-len 128

# ============================================================
# EC2 레벨 nginx — Cloudflare → 이 nginx → frontend / ingestion
# - 보안 헤더: HSTS / X-Frame-Options / X-Content-Type-Options / Referrer-Policy / Permissions-Policy
# - Rate limit: /auth/login (brute force 방어), /ingest (agent flood 방어)
# - Cloudflare real_ip 복원
# - SSE 버퍼링 해제
# ============================================================
worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    server_tokens off;

    # ── Cloudflare 실제 클라이언트 IP 복원 ──────────────────────
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── Rate limit zone 정의 ─────────────────────────────────────
    # /auth/login: IP당 5 req/min (brute force 방어)
    # /ingest    : IP당 100 req/sec (agent flood 방어, 정상 트래픽엔 영향 X)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=100r/s;

    # ── 공통 보안 헤더 (map으로 묶어서 재사용) ───────────────────
    map $host $hsts_header {
        default "max-age=31536000; includeSubDomains; preload";
    }

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────
    server {
        listen 80;
        server_name infrared.kr app.infrared.kr api.infrared.kr;
        return 301 https://$host$request_uri;
    }

    # ── app.infrared.kr → frontend (nginx static) ────────────────
    server {
        listen 443 ssl;
        server_name app.infrared.kr;

        ssl_certificate     /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 보안 헤더
        add_header Strict-Transport-Security $hsts_header always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── api.infrared.kr → ingestion:8000 ─────────────────────────
    server {
        listen 443 ssl;
        server_name api.infrared.kr;

        ssl_certificate     /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security $hsts_header always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # /auth/login — brute force 방어 (5 req/min/IP)
        location /auth/login {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://ingestion:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # /ingest — agent flood 방어 (100 req/s/IP, burst 200)
        location /ingest {
            limit_req zone=ingest burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://ingestion:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # SSE 스트림 — 버퍼링 끄고 read timeout 24h
        location /events/stream {
            proxy_pass http://ingestion:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # 나머지 API
        location / {
            proxy_pass http://ingestion:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
        }
    }

    # ── 루트 infrared.kr → app 으로 301 ──────────────────────────
    server {
        listen 443 ssl;
        server_name infrared.kr;

        ssl_certificate     /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security $hsts_header always;

        return 301 https://app.infrared.kr$request_uri;
    }
}
